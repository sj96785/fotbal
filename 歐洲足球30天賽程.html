<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f5f7">
<title>歐洲足球賽程</title>
<style>
  :root{
    --bg:#f4f5f7;
    --card:#ffffff;
    --text:#111827;
    --sub:#6b7280;
    --line:#e5e7eb;
    --accent:#111827;
    --danger:#b91c1c;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button,input{font:inherit}
  .app{max-width:760px;margin:0 auto;padding:16px 14px 60px}
  .topbar{
    position:sticky;top:0;z-index:20;
    background:rgba(244,245,247,.94);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    padding:calc(10px + env(safe-area-inset-top)) 0 12px;
  }
  .title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{margin:0;font-size:28px;line-height:1.15;letter-spacing:-.5px}
  .subtitle{font-size:13px;color:var(--sub);margin-top:5px}
  .icon-btn{
    border:0;background:var(--card);width:42px;height:42px;border-radius:14px;
    box-shadow:0 1px 5px rgba(0,0,0,.08);font-size:20px;cursor:pointer;
  }
  .status{
    margin-top:12px;padding:10px 12px;background:var(--card);border-radius:13px;
    font-size:13px;color:var(--sub);display:flex;align-items:center;gap:8px;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;flex:none}
  .dot.loading{animation:pulse 1s infinite}
  .dot.ok{background:#16a34a}
  .dot.error{background:#dc2626}
  @keyframes pulse{50%{opacity:.25}}
  .day{margin-top:18px;scroll-margin-top:120px}
  .day-head{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:0 3px 8px;
  }
  .day-title{font-size:20px;font-weight:800;letter-spacing:-.2px}
  .today-badge{
    font-size:12px;font-weight:700;padding:3px 7px;border-radius:999px;
    color:#fff;background:var(--accent);margin-left:7px;vertical-align:2px;
  }
  .day-count{font-size:12px;color:var(--sub)}
  .empty{
    background:var(--card);border-radius:16px;padding:18px;
    color:#9ca3af;text-align:center;font-size:14px;
  }
  .league{
    background:var(--card);border-radius:18px;margin-bottom:10px;
    overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.045);
  }
  .league-head{
    display:flex;align-items:center;gap:10px;padding:12px 14px;
    border-bottom:1px solid var(--line);
  }
  .league-logo{width:28px;height:28px;object-fit:contain;flex:none}
  .league-name{font-size:15px;font-weight:800;flex:1}
  .match{
    display:grid;grid-template-columns:56px 1fr 34px 1fr;
    align-items:center;gap:8px;padding:12px 12px;
    border-bottom:1px solid var(--line);
  }
  .match:last-child{border-bottom:0}
  .time{text-align:center;font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}
  .team{font-size:14px;font-weight:650;line-height:1.25}
  .team.home{text-align:right}
  .team.away{text-align:left}
  .vs{text-align:center;font-size:12px;color:#9ca3af;font-weight:700}
  .score{font-size:14px;color:var(--sub);font-weight:800}
  .settings-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.34);z-index:50;
    display:none;align-items:flex-end;justify-content:center;
  }
  .settings-backdrop.show{display:flex}
  .sheet{
    width:min(760px,100%);background:#fff;border-radius:24px 24px 0 0;
    padding:20px 16px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 30px rgba(0,0,0,.15)
  }
  .sheet h2{margin:0 0 6px;font-size:22px}
  .sheet p{margin:0 0 16px;color:var(--sub);font-size:13px;line-height:1.5}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
  .field input{
    width:100%;border:1px solid #d1d5db;border-radius:13px;padding:13px 12px;
    outline:none;background:#fff;
  }
  .field input:focus{border-color:#111827}
  .actions{display:flex;gap:9px;margin-top:14px}
  .btn{
    flex:1;border:0;border-radius:13px;padding:13px 12px;font-weight:800;cursor:pointer;
  }
  .btn.primary{background:#111827;color:#fff}
  .btn.secondary{background:#f3f4f6;color:#111827}
  .btn.danger{background:#fee2e2;color:var(--danger)}
  .error-box{
    margin-top:16px;background:#fff;border-radius:16px;padding:16px;
    color:var(--danger);font-size:14px;line-height:1.55;display:none;
  }
  .footer-note{text-align:center;color:#9ca3af;font-size:11px;margin-top:26px}
  @media (max-width:430px){
    h1{font-size:26px}
    .match{grid-template-columns:48px minmax(0,1fr) 28px minmax(0,1fr);gap:6px;padding:11px 9px}
    .team{font-size:13px}
    .time{font-size:13px}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="title-row">
      <div>
        <h1>歐洲足球賽程</h1>
        <div class="subtitle">今天起 30 天 · 台灣時間</div>
      </div>
      <button class="icon-btn" id="settingsBtn" aria-label="設定">⚙︎</button>
    </div>
    <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">準備載入</span></div>
  </header>

  <main id="schedule"></main>
  <div class="error-box" id="errorBox"></div>
  <div class="footer-note">資料由 API-Football 提供</div>
</div>

<div class="settings-backdrop" id="settingsBackdrop">
  <section class="sheet" role="dialog" aria-modal="true">
    <h2>API 設定</h2>
    <p>請輸入 API-Football 的 API Key。金鑰只會儲存在這台裝置的瀏覽器中，不會寫入此 HTML。</p>
    <div class="field">
      <label for="apiKeyInput">API Key</label>
      <input id="apiKeyInput" type="password" autocomplete="off" placeholder="輸入你的 API Key">
    </div>
    <div class="actions">
      <button class="btn secondary" id="closeSettingsBtn">取消</button>
      <button class="btn primary" id="saveKeyBtn">儲存並更新</button>
    </div>
    <div class="actions">
      <button class="btn danger" id="deleteKeyBtn">刪除已儲存金鑰</button>
    </div>
  </section>
</div>

<script>
(() => {
  "use strict";

  const API_BASE = "https://v3.football.api-sports.io";
  const STORAGE_KEY = "football_api_key";

  // API-Football 賽事 ID
  const COMPETITIONS = [
    { id: 39,  name: "英格蘭超級聯賽", order: 1 },
    { id: 140, name: "西班牙甲級聯賽", order: 2 },
    { id: 135, name: "義大利甲級聯賽", order: 3 },
    { id: 78,  name: "德國甲級聯賽", order: 4 },
    { id: 61,  name: "法國甲級聯賽", order: 5 },
    { id: 2,   name: "歐洲冠軍聯賽", order: 6 },
    { id: 3,   name: "歐霸聯賽", order: 7 },
    { id: 848, name: "歐洲協會聯賽", order: 8 }
  ];

  const els = {
    schedule: document.getElementById("schedule"),
    statusDot: document.getElementById("statusDot"),
    statusText: document.getElementById("statusText"),
    errorBox: document.getElementById("errorBox"),
    settingsBackdrop: document.getElementById("settingsBackdrop"),
    apiKeyInput: document.getElementById("apiKeyInput"),
    settingsBtn: document.getElementById("settingsBtn"),
    closeSettingsBtn: document.getElementById("closeSettingsBtn"),
    saveKeyBtn: document.getElementById("saveKeyBtn"),
    deleteKeyBtn: document.getElementById("deleteKeyBtn")
  };

  function getApiKey() {
    return localStorage.getItem(STORAGE_KEY) || "";
  }

  function setStatus(text, type = "") {
    els.statusText.textContent = text;
    els.statusDot.className = "dot" + (type ? " " + type : "");
  }

  function showSettings() {
    els.apiKeyInput.value = getApiKey();
    els.settingsBackdrop.classList.add("show");
    setTimeout(() => els.apiKeyInput.focus(), 50);
  }

  function hideSettings() {
    els.settingsBackdrop.classList.remove("show");
  }

  function pad(n) {
    return String(n).padStart(2, "0");
  }

  function localISODate(date) {
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "Asia/Taipei",
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }).formatToParts(date);
    const map = Object.fromEntries(parts.map(p => [p.type, p.value]));
    return `${map.year}-${map.month}-${map.day}`;
  }

  function getTaiwanTodayStart() {
    const todayStr = localISODate(new Date());
    return new Date(`${todayStr}T00:00:00+08:00`);
  }

  function addDays(date, days) {
    const d = new Date(date);
    d.setUTCDate(d.getUTCDate() + days);
    return d;
  }

  function getSeasonForDate(date) {
    const year = Number(new Intl.DateTimeFormat("en", {
      timeZone: "Asia/Taipei",
      year: "numeric"
    }).format(date));
    const month = Number(new Intl.DateTimeFormat("en", {
      timeZone: "Asia/Taipei",
      month: "numeric"
    }).format(date));
    return month >= 7 ? year : year - 1;
  }

  function dateKeyFromFixture(iso) {
    return localISODate(new Date(iso));
  }

  function formatTime(iso) {
    return new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false
    }).format(new Date(iso));
  }

  function formatDay(date) {
    return new Intl.DateTimeFormat("zh-TW", {
      timeZone: "Asia/Taipei",
      month: "numeric",
      day: "numeric",
      weekday: "short"
    }).format(date);
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function competitionMeta(id) {
    return COMPETITIONS.find(c => c.id === id) || { order: 999, name: "" };
  }

  async function fetchCompetition(apiKey, competition, from, to, season) {
    const url = new URL(`${API_BASE}/fixtures`);
    url.searchParams.set("league", competition.id);
    url.searchParams.set("season", season);
    url.searchParams.set("from", from);
    url.searchParams.set("to", to);
    url.searchParams.set("timezone", "Asia/Taipei");

    const res = await fetch(url, {
      headers: { "x-apisports-key": apiKey }
    });

    if (!res.ok) {
      throw new Error(`${competition.name} 查詢失敗（HTTP ${res.status}）`);
    }

    const data = await res.json();

    if (data.errors && Object.keys(data.errors).length) {
      const detail = Object.values(data.errors).join("、");
      throw new Error(`${competition.name}：${detail}`);
    }

    return Array.isArray(data.response) ? data.response : [];
  }

  async function fetchAllFixtures(apiKey) {
    const start = getTaiwanTodayStart();
    const end = addDays(start, 29);
    const from = localISODate(start);
    const to = localISODate(end);

    // 30 天可能跨越 7 月的賽季分界，因此同時涵蓋需要的 season。
    const seasons = [...new Set([getSeasonForDate(start), getSeasonForDate(end)])];
    const requests = [];

    for (const comp of COMPETITIONS) {
      for (const season of seasons) {
        requests.push(
          fetchCompetition(apiKey, comp, from, to, season)
            .catch(err => ({ __error: err.message, __competition: comp.name }))
        );
      }
    }

    const results = await Promise.all(requests);
    const fixtures = [];
    const errors = [];
    const seen = new Set();

    for (const result of results) {
      if (result && result.__error) {
        errors.push(result.__error);
        continue;
      }
      for (const fixture of result) {
        const id = fixture?.fixture?.id;
        if (id && !seen.has(id)) {
          seen.add(id);
          fixtures.push(fixture);
        }
      }
    }

    return { fixtures, errors, start, end };
  }

  function render(fixtures, start) {
    const days = [];

    for (let i = 0; i < 30; i++) {
      const date = addDays(start, i);
      const key = localISODate(date);
      const dayFixtures = fixtures.filter(f => dateKeyFromFixture(f.fixture.date) === key);

      const grouped = new Map();
      for (const fixture of dayFixtures) {
        const leagueId = fixture.league.id;
        if (!grouped.has(leagueId)) grouped.set(leagueId, []);
        grouped.get(leagueId).push(fixture);
      }

      const leagues = [...grouped.entries()].sort((a, b) => {
        return competitionMeta(a[0]).order - competitionMeta(b[0]).order;
      });

      let body = "";

      if (!leagues.length) {
        body = `<div class="empty">本日無賽事</div>`;
      } else {
        body = leagues.map(([leagueId, matches]) => {
          const league = matches[0].league;
          matches.sort((a, b) => new Date(a.fixture.date) - new Date(b.fixture.date));

          const matchHtml = matches.map(match => {
            const status = match.fixture.status.short;
            const played = ["1H","HT","2H","ET","BT","P","SUSP","INT","FT","AET","PEN","LIVE"].includes(status);
            let center = "VS";

            if (played && match.goals.home !== null && match.goals.away !== null) {
              center = `<span class="score">${escapeHtml(match.goals.home)}-${escapeHtml(match.goals.away)}</span>`;
            }

            return `
              <div class="match">
                <div class="time">${escapeHtml(formatTime(match.fixture.date))}</div>
                <div class="team home">${escapeHtml(match.teams.home.name)}</div>
                <div class="vs">${center}</div>
                <div class="team away">${escapeHtml(match.teams.away.name)}</div>
              </div>`;
          }).join("");

          return `
            <section class="league">
              <div class="league-head">
                <img class="league-logo" src="${escapeHtml(league.logo)}" alt="" loading="lazy">
                <div class="league-name">${escapeHtml(competitionMeta(leagueId).name || league.name)}</div>
              </div>
              ${matchHtml}
            </section>`;
        }).join("");
      }

      days.push(`
        <section class="day" id="day-${key}">
          <div class="day-head">
            <div class="day-title">${escapeHtml(formatDay(date))}${i === 0 ? '<span class="today-badge">今天</span>' : ''}</div>
            <div class="day-count">${dayFixtures.length ? dayFixtures.length + " 場" : ""}</div>
          </div>
          ${body}
        </section>`);
    }

    els.schedule.innerHTML = days.join("");
  }

  async function loadSchedule() {
    const apiKey = getApiKey();

    if (!apiKey) {
      setStatus("尚未設定 API Key");
      render([], getTaiwanTodayStart());
      showSettings();
      return;
    }

    els.errorBox.style.display = "none";
    els.errorBox.textContent = "";
    setStatus("正在更新 30 天賽程…", "loading");

    try {
      const { fixtures, errors, start } = await fetchAllFixtures(apiKey);
      render(fixtures, start);

      if (errors.length && fixtures.length === 0) {
        throw new Error(errors.join("\n"));
      }

      const now = new Intl.DateTimeFormat("zh-TW", {
        timeZone: "Asia/Taipei",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(new Date());

      setStatus(`已更新 · 共 ${fixtures.length} 場 · ${now}`, "ok");

      if (errors.length) {
        els.errorBox.textContent = "部分賽事查詢未成功：\n" + errors.join("\n");
        els.errorBox.style.whiteSpace = "pre-line";
        els.errorBox.style.display = "block";
      }
    } catch (err) {
      console.error(err);
      setStatus("更新失敗", "error");
      els.errorBox.textContent =
        `${err.message}\n\n請確認 API Key 是否正確，以及目前方案是否支援欲查詢的賽季。`;
      els.errorBox.style.whiteSpace = "pre-line";
      els.errorBox.style.display = "block";
    }
  }

  els.settingsBtn.addEventListener("click", showSettings);
  els.closeSettingsBtn.addEventListener("click", hideSettings);

  els.settingsBackdrop.addEventListener("click", e => {
    if (e.target === els.settingsBackdrop) hideSettings();
  });

  els.saveKeyBtn.addEventListener("click", () => {
    const key = els.apiKeyInput.value.trim();
    if (!key) return;
    localStorage.setItem(STORAGE_KEY, key);
    hideSettings();
    loadSchedule();
  });

  els.deleteKeyBtn.addEventListener("click", () => {
    localStorage.removeItem(STORAGE_KEY);
    els.apiKeyInput.value = "";
    hideSettings();
    setStatus("API Key 已刪除");
    render([], getTaiwanTodayStart());
    showSettings();
  });

  render([], getTaiwanTodayStart());
  loadSchedule();
})();
</script>
</body>
</html>
