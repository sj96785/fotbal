<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f5f7">
<title>足球賽程</title>
<style>
:root{
  --bg:#f4f5f7;--card:#fff;--text:#111827;--sub:#6b7280;--line:#e5e7eb;
  --accent:#2563eb;--accentSoft:#dbeafe;--ok:#16a34a;--err:#dc2626;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
  -webkit-font-smoothing:antialiased
}
button{font:inherit}
.app{max-width:760px;margin:0 auto;padding:16px 14px 60px}
.topbar{
  position:sticky;top:0;z-index:20;background:rgba(244,245,247,.95);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:calc(10px + env(safe-area-inset-top)) 0 12px
}
.title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
h1{margin:0;font-size:30px;line-height:1.15;letter-spacing:-.7px}
.subtitle{font-size:13px;color:var(--sub);margin-top:6px}
.calendar-btn{
  border:0;background:#fff;width:48px;height:48px;border-radius:16px;
  box-shadow:0 1px 7px rgba(0,0,0,.09);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
.status{
  margin-top:12px;padding:11px 13px;background:#fff;border-radius:14px;
  font-size:13px;color:var(--sub);display:flex;align-items:center;gap:8px
}
.dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;flex:none}
.dot.loading{background:#f59e0b;animation:pulse 1s infinite}
.dot.ok{background:var(--ok)} .dot.error{background:var(--err)}
@keyframes pulse{50%{opacity:.25}}

.day{margin-top:18px;scroll-margin-top:125px}
.day-head{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 8px}
.day-title{font-size:21px;font-weight:850;letter-spacing:-.3px}
.today-badge{
  display:inline-block;margin-left:7px;padding:3px 7px;border-radius:999px;
  background:#111827;color:#fff;font-size:11px;font-weight:800;vertical-align:3px
}
.day-count{font-size:12px;color:var(--sub)}
.empty{
  background:#fff;border-radius:17px;padding:20px;color:#9ca3af;
  text-align:center;font-size:14px
}
.league{
  background:#fff;border-radius:18px;margin-bottom:11px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.045)
}
.league-head{
  display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)
}
.league-logo{width:30px;height:30px;object-fit:contain;flex:none}
.league-name{font-size:15px;font-weight:850;flex:1}
.stage{
  font-size:11px;color:var(--sub);padding:7px 12px 0;font-weight:700
}
.match{
  display:grid;grid-template-columns:52px minmax(0,1fr) 36px minmax(0,1fr);
  align-items:center;gap:7px;padding:12px 9px;border-bottom:1px solid var(--line)
}
.match:last-child{border-bottom:0}
.time{text-align:center;font-size:13px;font-weight:850;font-variant-numeric:tabular-nums}
.team{line-height:1.15;min-width:0;display:flex;align-items:center;gap:7px}
.team.home{text-align:right;justify-content:flex-end}
.team.away{text-align:left;justify-content:flex-start}
.team-text{min-width:0}
.team-logo{width:28px;height:28px;object-fit:contain;flex:none}
.team-en{font-size:13px;font-weight:750;overflow-wrap:anywhere}
.team-zh{font-size:11px;color:var(--sub);margin-top:4px;overflow-wrap:anywhere}
.vs{text-align:center;font-size:12px;color:#9ca3af;font-weight:800}
.score{font-size:14px;color:var(--text);font-weight:900}
.error-box{
  display:none;margin-top:18px;background:#fff;border-radius:17px;padding:16px;
  color:#b91c1c;font-size:14px;line-height:1.6;white-space:pre-line
}
.footer{text-align:center;color:#9ca3af;font-size:11px;margin-top:28px;line-height:1.6}

/* 日期選擇 */
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.36);display:none;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.sheet{
  width:min(760px,100%);max-height:88vh;overflow:auto;background:#fff;
  border-radius:26px 26px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));
  box-shadow:0 -10px 35px rgba(0,0,0,.18)
}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-title{font-size:22px;font-weight:900}
.close-btn{border:0;background:#f3f4f6;width:36px;height:36px;border-radius:12px;font-size:20px}
.range-summary{display:grid;grid-template-columns:1fr 28px 1fr;gap:8px;align-items:center;margin-bottom:14px}
.range-box{border:1.5px solid var(--line);border-radius:14px;padding:11px 10px;text-align:center;cursor:pointer}
.range-box.active{border-color:var(--accent);background:var(--accentSoft)}
.range-label{font-size:11px;color:var(--sub);margin-bottom:3px}
.range-date{font-size:14px;font-weight:850}
.arrow{text-align:center;color:#9ca3af}
.hint{text-align:center;color:var(--sub);font-size:12px;margin-bottom:12px}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.month-title{font-size:17px;font-weight:900}
.nav-btn{border:0;background:#f3f4f6;width:38px;height:38px;border-radius:12px;font-size:20px}
.weekdays,.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.weekdays div{text-align:center;font-size:11px;color:#9ca3af;padding:7px 0}
.day-btn{
  border:0;background:transparent;aspect-ratio:1/1;border-radius:12px;
  font-weight:750;cursor:pointer;position:relative;color:var(--text)
}
.day-btn.other{color:#cbd5e1}
.day-btn.today::after{content:"";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.day-btn.selected{background:var(--accent);color:#fff}
.day-btn.in-range{background:var(--accentSoft);border-radius:8px}
.day-btn.selected.today::after{background:#fff}
.sheet-actions{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;border:0;border-radius:14px;padding:14px 12px;font-weight:900}
.btn.secondary{background:#f3f4f6}.btn.primary{background:#111827;color:#fff}
.btn.primary:disabled{opacity:.4}

@media(max-width:430px){
  h1{font-size:28px}
  .match{grid-template-columns:48px minmax(0,1fr) 30px minmax(0,1fr);gap:5px;padding:11px 7px}
  .team-en{font-size:12px}.team-zh{font-size:10px}.time{font-size:12px}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="title-row">
      <div>
        <h1>足球賽程</h1>
        <div id="rangeSubtitle" class="subtitle">今天起 14 天 · 台灣時間</div>
      </div>
      <button id="calendarBtn" class="calendar-btn" aria-label="選擇日期區間">📅</button>
    </div>
    <div class="status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">準備載入</span>
    </div>
  </header>

  <main id="schedule"></main>
  <div id="errorBox" class="error-box"></div>
  <div class="footer">資料來源：ESPN 公開賽程資料<br>包含主要聯賽、歐洲俱樂部正賽與重要國家隊正式賽事</div>
</div>

<div id="calendarModal" class="modal">
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-title">選擇日期區間</div>
      <button id="closeCalendarBtn" class="close-btn">×</button>
    </div>
    <div class="range-summary">
      <div id="startBox" class="range-box active">
        <div class="range-label">開始日期</div><div id="startText" class="range-date"></div>
      </div>
      <div class="arrow">→</div>
      <div id="endBox" class="range-box">
        <div class="range-label">結束日期</div><div id="endText" class="range-date"></div>
      </div>
    </div>
    <div id="selectionHint" class="hint"></div>
    <div class="month-nav">
      <button id="prevMonthBtn" class="nav-btn">‹</button>
      <div id="monthTitle" class="month-title"></div>
      <button id="nextMonthBtn" class="nav-btn">›</button>
    </div>
    <div class="weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
    <div id="calendarGrid" class="calendar-grid"></div>
    <div class="sheet-actions">
      <button id="resetBtn" class="btn secondary">重設</button>
      <button id="confirmRangeBtn" class="btn primary">確定</button>
    </div>
  </div>
</div>

  "Bayern Munich":"拜仁慕尼黑","Borussia Dortmund":"多特蒙德",

  "Borussia Mönchengladbach":"門興格拉德巴赫","Werder Bremen":"雲達不萊梅",

  /* 歐戰常見 */
  "Ajax Amsterdam":"阿賈克斯","Ajax":"阿賈克斯","Benfica":"本菲卡","FC Porto":"波爾圖",
  "Porto":"波爾圖","Sporting CP":"里斯本競技","PSV Eindhoven":"PSV燕豪芬",
  "Feyenoord":"飛燕諾","Celtic":"塞爾提克","Rangers":"格拉斯哥流浪者",
  "Galatasaray":"加拉塔薩雷","Fenerbahce":"費內巴切","Fenerbahçe":"費內巴切",
  "Olympiacos":"奧林匹亞科斯","Red Star Belgrade":"貝爾格勒紅星",
  "Shakhtar Donetsk":"頓內次克礦工","Dynamo Kyiv":"基輔迪納摩",
  "FC Copenhagen":"哥本哈根","Copenhagen":"哥本哈根","Young Boys":"年輕人",
  "Red Bull Salzburg":"薩爾斯堡紅牛","Salzburg":"薩爾斯堡",
  "Club Brugge":"布魯日","Anderlecht":"安德萊赫特"
};

const els = Object.fromEntries(
  ["schedule","statusDot","statusText","errorBox","rangeSubtitle","calendarBtn","calendarModal",
   "closeCalendarBtn","startBox","endBox","startText","endText","selectionHint","monthTitle",
   "calendarGrid","prevMonthBtn","nextMonthBtn","resetBtn","confirmRangeBtn"]
  .map(id=>[id,document.getElementById(id)])
);

function setStatus(t,type=""){els.statusText.textContent=t;els.statusDot.className="dot"+(type?" "+type:"")}

function localKey(d){
  const p=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Taipei",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(d);
  const m=Object.fromEntries(p.map(x=>[x.type,x.value]));
  return `${m.year}-${m.month}-${m.day}`;
}
function fromKey(k){return new Date(k+"T00:00:00+08:00")}
function today(){return fromKey(localKey(new Date()))}
function addDays(d,n){return new Date(d.getTime()+n*86400000)}
function compact(d){return localKey(d).replaceAll("-","")}
function dateCount(a,b){return Math.floor((fromKey(localKey(b))-fromKey(localKey(a)))/86400000)+1}
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function fmtDay(d){return new Intl.DateTimeFormat("zh-TW",{timeZone:"Asia/Taipei",month:"numeric",day:"numeric",weekday:"short"}).format(d)}
function fmtDate(d){return new Intl.DateTimeFormat("zh-TW",{timeZone:"Asia/Taipei",year:"numeric",month:"numeric",day:"numeric"}).format(d)}
function fmtTime(iso){return new Intl.DateTimeFormat("zh-TW",{timeZone:"Asia/Taipei",hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date(iso))}

let activeStart=today(), activeEnd=addDays(activeStart,13);
let tempStart=null,tempEnd=null,selecting="start";
let viewMonth=new Date(activeStart.getFullYear(),activeStart.getMonth(),1);

function getTranslationCache(){
  try{return JSON.parse(localStorage.getItem(TRANSLATION_CACHE_KEY)||"{}")}catch{return {}}
}
function saveTranslationCache(c){localStorage.setItem(TRANSLATION_CACHE_KEY,JSON.stringify(c))}

function localChineseName(name){
  if(TEAM_ZH[name]) return TEAM_ZH[name];
  const cache=getTranslationCache();
  return cache[name]||"中文名稱載入中…";
}

async function translateUnknownNames(fixtures){
  const cache=getTranslationCache();
  const names=[...new Set(fixtures.flatMap(f=>[f.home,f.away]))]
    .filter(n=>!TEAM_ZH[n]&&!cache[n]);

  // 控制一次最多翻譯 80 個新名稱，避免過量請求。
  for(const name of names.slice(0,80)){
    try{
      const url="https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q="+encodeURIComponent(name);
      const r=await fetch(url);
      if(!r.ok) continue;
      const d=await r.json();
      const translated=(d?.[0]||[]).map(x=>x?.[0]||"").join("").trim();
      if(translated) cache[name]=translated;
    }catch{}
  }
  saveTranslationCache(cache);
}

function teamZh(name){
  return TEAM_ZH[name]||getTranslationCache()[name]||name;
}

function normalizeEvent(event,source,logo){
  const comp=event?.competitions?.[0];
  const competitors=comp?.competitors||[];
  const home=competitors.find(x=>x.homeAway==="home");
  const away=competitors.find(x=>x.homeAway==="away");
  if(!home||!away||!event.date)return null;
  const state=event?.status?.type?.state||"pre";
  const completed=!!event?.status?.type?.completed;
  const hasScore=state==="in"||completed;
  const detail=event?.status?.type?.detail||event?.status?.type?.shortDetail||"";
  return{
    id:`${source.slug}_${event.id}`,
    sourceSlug:source.slug,groupName:source.groupName,order:source.order,
    stagePrefix:source.stagePrefix||"",leagueLogo:logo||"",date:event.date,
    stage:detail,
    home:home.team?.displayName||home.team?.shortDisplayName||"Home",
    away:away.team?.displayName||away.team?.shortDisplayName||"Away",
    homeLogo:home.team?.logo||home.team?.logos?.[0]?.href||"",
    awayLogo:away.team?.logo||away.team?.logos?.[0]?.href||"",
    homeScore:hasScore?home.score:null,awayScore:hasScore?away.score:null
  };
}

async function fetchSource(source,start,end){
  const url=`https://site.api.espn.com/apis/site/v2/sports/soccer/${source.slug}/scoreboard?dates=${compact(start)}-${compact(end)}&limit=1000`;
  const r=await fetch(url,{cache:"no-store"});
  if(!r.ok) throw new Error(`${source.groupName} ${source.stagePrefix||""} HTTP ${r.status}`);
  const d=await r.json();
  const logo=d?.leagues?.[0]?.logos?.[0]?.href||d?.leagues?.[0]?.logos?.[1]?.href||"";
  return (Array.isArray(d.events)?d.events:[]).map(e=>normalizeEvent(e,source,logo)).filter(Boolean);
}

async function fetchAll(start,end){
  const settled=await Promise.allSettled(SOURCES.map(s=>fetchSource(s,start,end)));
  const fixtures=[],seen=new Set(),errors=[];
  settled.forEach((r,i)=>{
    if(r.status==="fulfilled"){
      for(const f of r.value) if(!seen.has(f.id)){seen.add(f.id);fixtures.push(f)}
    }else errors.push(r.reason?.message||SOURCES[i].groupName);
  });
  fixtures.sort((a,b)=>new Date(a.date)-new Date(b.date));
  return{fixtures,errors,fetchedAt:Date.now()};
}

function cacheKey(s,e){return CACHE_PREFIX+localKey(s)+"_"+localKey(e)}
function readCache(s,e){
  try{const d=JSON.parse(localStorage.getItem(cacheKey(s,e))||"null");return d&&Array.isArray(d.fixtures)?d:null}catch{return null}
}
function saveCache(s,e,d){localStorage.setItem(cacheKey(s,e),JSON.stringify(d))}
function fresh(c){return c&&Date.now()-c.fetchedAt<CACHE_TTL}
function fmtUpdate(ts){return new Intl.DateTimeFormat("zh-TW",{timeZone:"Asia/Taipei",month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date(ts))}

function render(fixtures,start,end){
  const out=[],count=dateCount(start,end),todayKey=localKey(today());

  for(let i=0;i<count;i++){
    const day=addDays(start,i),key=localKey(day);
    const items=fixtures.filter(f=>localKey(new Date(f.date))===key);

    const groups=new Map();
    for(const f of items){
      const groupKey=f.groupName;
      if(!groups.has(groupKey))groups.set(groupKey,[]);
      groups.get(groupKey).push(f);
    }

    const sorted=[...groups.entries()].sort((a,b)=>a[1][0].order-b[1][0].order);
    let body=`<div class="empty">本日無賽事</div>`;

    if(sorted.length){
      body=sorted.map(([groupName,matches])=>{
        matches.sort((a,b)=>new Date(a.date)-new Date(b.date));
        const logo=matches.find(x=>x.leagueLogo)?.leagueLogo||"";

        const rows=matches.map(m=>{
          const stageText=m.stage||"";
          const center=m.homeScore!==null&&m.awayScore!==null
            ? `<span class="score">${esc(m.homeScore)}-${esc(m.awayScore)}</span>`:"VS";
          return `
            ${stageText?`<div class="stage">${esc(stageText)}</div>`:""}
            <div class="match">
              <div class="time">${esc(fmtTime(m.date))}</div>
              <div class="team home">
                <div class="team-text">
                  <div class="team-en">${esc(m.home)}</div>
                  <div class="team-zh">${esc(teamZh(m.home))}</div>
                </div>
                ${m.homeLogo?`<img class="team-logo" src="${esc(m.homeLogo)}" alt="" loading="lazy">`:""}
              </div>
              <div class="vs">${center}</div>
              <div class="team away">
                ${m.awayLogo?`<img class="team-logo" src="${esc(m.awayLogo)}" alt="" loading="lazy">`:""}
                <div class="team-text">
                  <div class="team-en">${esc(m.away)}</div>
                  <div class="team-zh">${esc(teamZh(m.away))}</div>
                </div>
              </div>
            </div>`;
        }).join("");

        return `<section class="league">
          <div class="league-head">
            ${logo?`<img class="league-logo" src="${esc(logo)}" alt="" loading="lazy">`:""}
            <div class="league-name">${esc(groupName)}</div>
          </div>${rows}</section>`;
      }).join("");
    }

    out.push(`<section class="day">
      <div class="day-head">
        <div class="day-title">${esc(fmtDay(day))}${key===todayKey?'<span class="today-badge">今天</span>':""}</div>
        <div class="day-count">${items.length?items.length+" 場":""}</div>
      </div>${body}</section>`);
  }
  els.schedule.innerHTML=out.join("");
}

function updateSubtitle(){
  if(localKey(activeStart)===localKey(today())&&dateCount(activeStart,activeEnd)===14){
    els.rangeSubtitle.textContent="今天起 14 天 · 台灣時間";
  }else els.rangeSubtitle.textContent=`${fmtDate(activeStart)} ～ ${fmtDate(activeEnd)} · 台灣時間`;
}

async function loadRange(start,end){
  activeStart=start;activeEnd=end;updateSubtitle();els.errorBox.style.display="none";
  const c=readCache(start,end);

  if(fresh(c)){
    render(c.fixtures,start,end);
    setStatus(`使用快取 · ${c.fixtures.length} 場 · ${fmtUpdate(c.fetchedAt)}`,"ok");
    translateUnknownNames(c.fixtures).then(()=>render(c.fixtures,start,end));
    return;
  }

  if(c)render(c.fixtures,start,end);else render([],start,end);
  setStatus("正在更新所有賽事…","loading");

  try{
    const d=await fetchAll(start,end);
    if(!d.fixtures.length)throw new Error("目前日期區間沒有取得任何賽程資料");
    saveCache(start,end,d);
    render(d.fixtures,start,end);
    setStatus(`已更新 · 共 ${d.fixtures.length} 場 · ${fmtUpdate(d.fetchedAt)}`,"ok");

    // 背景補齊未知隊名中文翻譯，完成後重繪。
    translateUnknownNames(d.fixtures).then(()=>render(d.fixtures,start,end));

    // 單一來源失效時不干擾畫面，避免大量無效 slug 造成紅色錯誤。
  }catch(e){
    setStatus(c?"更新失敗，顯示上次資料":"更新失敗","error");
    els.errorBox.textContent=(e?.message||"無法取得資料")+(c?"\n\n已保留上次成功取得的賽程。":"");
    els.errorBox.style.display="block";
  }
}

/* 月曆 */
function same(a,b){return a&&b&&localKey(a)===localKey(b)}
function renderCalendar(){
  els.monthTitle.textContent=new Intl.DateTimeFormat("zh-TW",{year:"numeric",month:"long"}).format(viewMonth);
  els.startText.textContent=tempStart?fmtDate(tempStart):"尚未選擇";
  els.endText.textContent=tempEnd?fmtDate(tempEnd):"尚未選擇";
  els.startBox.classList.toggle("active",selecting==="start");
  els.endBox.classList.toggle("active",selecting==="end");
  els.selectionHint.textContent=selecting==="start"?"請選擇開始日期":tempEnd?"日期區間已完成":"請選擇結束日期";
  els.confirmRangeBtn.disabled=!(tempStart&&tempEnd);

  const y=viewMonth.getFullYear(),m=viewMonth.getMonth(),first=new Date(y,m,1),startCell=new Date(y,m,1-first.getDay());
  let html="";
  for(let i=0;i<42;i++){
    const d=new Date(startCell);d.setDate(startCell.getDate()+i);
    html+=`<button class="day-btn${d.getMonth()!==m?" other":""}${same(d,tempStart)||same(d,tempEnd)?" selected":""}${tempStart&&tempEnd&&d>tempStart&&d<tempEnd?" in-range":""}${same(d,today())?" today":""}" data-date="${localKey(d)}">${d.getDate()}</button>`;
  }
  els.calendarGrid.innerHTML=html;
  els.calendarGrid.querySelectorAll(".day-btn").forEach(b=>b.onclick=()=>{
    const d=fromKey(b.dataset.date);
    if(selecting==="start"){tempStart=d;tempEnd=null;selecting="end"}
    else if(!tempStart||d<tempStart){tempStart=d;tempEnd=null;selecting="end"}
    else tempEnd=d;
    renderCalendar();
  });
}
function openCalendar(){
  tempStart=new Date(activeStart);tempEnd=new Date(activeEnd);selecting="start";
  viewMonth=new Date(activeStart.getFullYear(),activeStart.getMonth(),1);
  renderCalendar();els.calendarModal.classList.add("show");
}
function closeCalendar(){els.calendarModal.classList.remove("show")}

els.calendarBtn.onclick=openCalendar;
els.closeCalendarBtn.onclick=closeCalendar;
els.calendarModal.onclick=e=>{if(e.target===els.calendarModal)closeCalendar()};
els.startBox.onclick=()=>{selecting="start";renderCalendar()};
els.endBox.onclick=()=>{if(tempStart){selecting="end";renderCalendar()}};
els.prevMonthBtn.onclick=()=>{viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-1,1);renderCalendar()};
els.nextMonthBtn.onclick=()=>{viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,1);renderCalendar()};
els.resetBtn.onclick=()=>{tempStart=null;tempEnd=null;selecting="start";viewMonth=new Date(today().getFullYear(),today().getMonth(),1);renderCalendar()};
els.confirmRangeBtn.onclick=()=>{if(tempStart&&tempEnd){closeCalendar();loadRange(new Date(tempStart),new Date(tempEnd))}};

updateSubtitle();
loadRange(activeStart,activeEnd);
})();
</script>
