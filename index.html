<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f5f7">
<title>歐洲足球賽程</title>
<style>
  :root{
    --bg:#f4f5f7;--card:#fff;--text:#111827;--sub:#6b7280;--line:#e5e7eb;
    --accent:#2563eb;--ok:#16a34a;--error:#dc2626;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button{font:inherit}
  .app{max-width:760px;margin:0 auto;padding:16px 14px 60px}
  .topbar{
    position:sticky;top:0;z-index:20;background:rgba(244,245,247,.95);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    padding:calc(10px + env(safe-area-inset-top)) 0 12px;
  }
  .title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{margin:0;font-size:28px;line-height:1.15;letter-spacing:-.5px}
  .subtitle{font-size:13px;color:var(--sub);margin-top:5px}
  .refresh-btn{
    border:0;background:var(--card);width:48px;height:48px;border-radius:16px;
    box-shadow:0 1px 7px rgba(0,0,0,.09);font-size:22px;cursor:pointer
  }
  .refresh-btn:disabled{opacity:.45}
  .status{
    margin-top:12px;padding:11px 13px;background:var(--card);border-radius:14px;
    font-size:13px;color:var(--sub);display:flex;align-items:center;gap:8px
  }
  .dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;flex:none}
  .dot.loading{background:#f59e0b;animation:pulse 1s infinite}
  .dot.ok{background:var(--ok)}
  .dot.error{background:var(--error)}
  @keyframes pulse{50%{opacity:.25}}

  .day{margin-top:18px;scroll-margin-top:125px}
  .day-head{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 8px}
  .day-title{font-size:21px;font-weight:850;letter-spacing:-.3px}
  .today-badge{
    display:inline-block;margin-left:7px;padding:3px 7px;border-radius:999px;
    background:#111827;color:#fff;font-size:11px;font-weight:800;vertical-align:3px
  }
  .day-count{font-size:12px;color:var(--sub)}
  .empty{
    background:var(--card);border-radius:17px;padding:20px;
    color:#9ca3af;text-align:center;font-size:14px
  }
  .league{
    background:var(--card);border-radius:18px;margin-bottom:11px;overflow:hidden;
    box-shadow:0 1px 4px rgba(0,0,0,.045)
  }
  .league-head{
    display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)
  }
  .league-logo{width:30px;height:30px;object-fit:contain;flex:none}
  .league-name{font-size:15px;font-weight:850;flex:1}
  .match{
    display:grid;grid-template-columns:55px minmax(0,1fr) 36px minmax(0,1fr);
    align-items:center;gap:8px;padding:12px 11px;border-bottom:1px solid var(--line)
  }
  .match:last-child{border-bottom:0}
  .time{text-align:center;font-size:14px;font-weight:850;font-variant-numeric:tabular-nums}
  .team{font-size:14px;font-weight:650;line-height:1.28;overflow-wrap:anywhere}
  .team.home{text-align:right}.team.away{text-align:left}
  .vs{text-align:center;font-size:12px;color:#9ca3af;font-weight:800}
  .score{font-size:14px;color:var(--text);font-weight:900}
  .error-box{
    display:none;margin-top:18px;background:#fff;border-radius:17px;padding:16px;
    color:#b91c1c;font-size:14px;line-height:1.6;white-space:pre-line
  }
  .footer{text-align:center;color:#9ca3af;font-size:11px;margin-top:28px;line-height:1.6}
  @media(max-width:430px){
    h1{font-size:26px}
    .match{grid-template-columns:49px minmax(0,1fr) 30px minmax(0,1fr);gap:6px;padding:11px 8px}
    .team,.time{font-size:13px}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="title-row">
      <div>
        <h1>歐洲足球賽程</h1>
        <div class="subtitle">今天起 30 天 · 台灣時間</div>
      </div>
      <button id="refreshBtn" class="refresh-btn" aria-label="立即更新">↻</button>
    </div>
    <div class="status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">準備載入</span>
    </div>
  </header>

  <main id="schedule"></main>
  <div id="errorBox" class="error-box"></div>
  <div class="footer">資料來源：ESPN 公開賽程資料<br>本頁每 6 小時自動重新抓取一次</div>
</div>

<script>
(() => {
  "use strict";

  const CACHE_KEY = "euro_football_schedule_cache_v2";
  const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 小時

  const COMPETITIONS = [
    { slug:"eng.1",           name:"英格蘭超級聯賽", order:1 },
    { slug:"esp.1",           name:"西班牙甲級聯賽", order:2 },
    { slug:"ita.1",           name:"義大利甲級聯賽", order:3 },
    { slug:"ger.1",           name:"德國甲級聯賽", order:4 },
    { slug:"fra.1",           name:"法國甲級聯賽", order:5 },
    { slug:"uefa.champions",  name:"歐洲冠軍聯賽",   order:6 },
    { slug:"uefa.europa",     name:"歐霸聯賽",       order:7 },
    { slug:"uefa.europa.conf",name:"歐洲協會聯賽",   order:8 }
  ];

  const els = {
    schedule: document.getElementById("schedule"),
    statusDot: document.getElementById("statusDot"),
    statusText: document.getElementById("statusText"),
    errorBox: document.getElementById("errorBox"),
    refreshBtn: document.getElementById("refreshBtn")
  };

  function setStatus(text, type=""){
    els.statusText.textContent = text;
    els.statusDot.className = "dot" + (type ? " " + type : "");
  }

  function localDateKey(date){
    const parts = new Intl.DateTimeFormat("en-CA",{
      timeZone:"Asia/Taipei",year:"numeric",month:"2-digit",day:"2-digit"
    }).formatToParts(date);
    const m = Object.fromEntries(parts.map(p=>[p.type,p.value]));
    return `${m.year}-${m.month}-${m.day}`;
  }

  function compactDate(date){
    return localDateKey(date).replaceAll("-","");
  }

  function taiwanTodayStart(){
    return new Date(localDateKey(new Date()) + "T00:00:00+08:00");
  }

  function addDays(date, days){
    return new Date(date.getTime() + days * 86400000);
  }

  function formatDay(date){
    return new Intl.DateTimeFormat("zh-TW",{
      timeZone:"Asia/Taipei",month:"numeric",day:"numeric",weekday:"short"
    }).format(date);
  }

  function formatTime(iso){
    return new Intl.DateTimeFormat("zh-TW",{
      timeZone:"Asia/Taipei",hour:"2-digit",minute:"2-digit",hour12:false
    }).format(new Date(iso));
  }

  function escapeHtml(v){
    return String(v ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function getCompetition(slug){
    return COMPETITIONS.find(c=>c.slug===slug);
  }

  function normalizeEvent(event, competition, leagueLogo){
    const comp = event?.competitions?.[0];
    const competitors = comp?.competitors || [];
    const home = competitors.find(x=>x.homeAway==="home");
    const away = competitors.find(x=>x.homeAway==="away");
    if(!home || !away || !event.date) return null;

    const state = event?.status?.type?.state || "pre";
    const completed = !!event?.status?.type?.completed;
    const hasScore = state === "in" || completed;

    return {
      id: event.id,
      competitionSlug: competition.slug,
      competitionName: competition.name,
      competitionOrder: competition.order,
      leagueLogo: leagueLogo || "",
      date: event.date,
      home: home.team?.displayName || home.team?.shortDisplayName || "主隊",
      away: away.team?.displayName || away.team?.shortDisplayName || "客隊",
      homeScore: hasScore ? home.score : null,
      awayScore: hasScore ? away.score : null
    };
  }

  async function fetchCompetition(competition, fromDate, toDate){
    const url =
      `https://site.api.espn.com/apis/site/v2/sports/soccer/${competition.slug}/scoreboard` +
      `?dates=${compactDate(fromDate)}-${compactDate(toDate)}&limit=1000`;

    const res = await fetch(url, { cache:"no-store" });
    if(!res.ok) throw new Error(`${competition.name}：HTTP ${res.status}`);

    const data = await res.json();
    const leagueLogo =
      data?.leagues?.[0]?.logos?.[0]?.href ||
      data?.leagues?.[0]?.logos?.[1]?.href || "";

    const events = Array.isArray(data.events) ? data.events : [];
    return events.map(e=>normalizeEvent(e, competition, leagueLogo)).filter(Boolean);
  }

  async function fetchAll(){
    const start = taiwanTodayStart();
    const end = addDays(start,29);

    const settled = await Promise.allSettled(
      COMPETITIONS.map(c=>fetchCompetition(c,start,end))
    );

    const fixtures = [];
    const errors = [];
    const seen = new Set();

    settled.forEach((result, i)=>{
      if(result.status === "fulfilled"){
        for(const item of result.value){
          if(!seen.has(item.id)){
            seen.add(item.id);
            fixtures.push(item);
          }
        }
      }else{
        errors.push(`${COMPETITIONS[i].name}：${result.reason?.message || "查詢失敗"}`);
      }
    });

    fixtures.sort((a,b)=>new Date(a.date)-new Date(b.date));
    return { fixtures, errors, start: localDateKey(start), fetchedAt: Date.now() };
  }

  function saveCache(payload){
    localStorage.setItem(CACHE_KEY, JSON.stringify(payload));
  }

  function readCache(){
    try{
      const raw = localStorage.getItem(CACHE_KEY);
      if(!raw) return null;
      const data = JSON.parse(raw);
      if(!data || !Array.isArray(data.fixtures) || !data.fetchedAt) return null;
      return data;
    }catch{
      return null;
    }
  }

  function isCacheFresh(cache){
    return cache && (Date.now() - cache.fetchedAt < CACHE_TTL);
  }

  function render(fixtures){
    const start = taiwanTodayStart();
    const output = [];

    for(let i=0;i<30;i++){
      const day = addDays(start,i);
      const key = localDateKey(day);
      const dayFixtures = fixtures.filter(f=>localDateKey(new Date(f.date))===key);

      const groups = new Map();
      for(const f of dayFixtures){
        if(!groups.has(f.competitionSlug)) groups.set(f.competitionSlug,[]);
        groups.get(f.competitionSlug).push(f);
      }

      const sortedGroups = [...groups.entries()].sort((a,b)=>{
        return getCompetition(a[0]).order - getCompetition(b[0]).order;
      });

      let body = `<div class="empty">本日無賽事</div>`;

      if(sortedGroups.length){
        body = sortedGroups.map(([slug,matches])=>{
          const meta = getCompetition(slug);
          matches.sort((a,b)=>new Date(a.date)-new Date(b.date));
          const logo = matches.find(x=>x.leagueLogo)?.leagueLogo || "";

          const rows = matches.map(m=>{
            const center =
              m.homeScore !== null && m.awayScore !== null
                ? `<span class="score">${escapeHtml(m.homeScore)}-${escapeHtml(m.awayScore)}</span>`
                : "VS";

            return `
              <div class="match">
                <div class="time">${escapeHtml(formatTime(m.date))}</div>
                <div class="team home">${escapeHtml(m.home)}</div>
                <div class="vs">${center}</div>
                <div class="team away">${escapeHtml(m.away)}</div>
              </div>`;
          }).join("");

          return `
            <section class="league">
              <div class="league-head">
                ${logo ? `<img class="league-logo" src="${escapeHtml(logo)}" alt="" loading="lazy">` : ""}
                <div class="league-name">${escapeHtml(meta.name)}</div>
              </div>
              ${rows}
            </section>`;
        }).join("");
      }

      output.push(`
        <section class="day">
          <div class="day-head">
            <div class="day-title">
              ${escapeHtml(formatDay(day))}
              ${i===0 ? '<span class="today-badge">今天</span>' : ''}
            </div>
            <div class="day-count">${dayFixtures.length ? dayFixtures.length+" 場" : ""}</div>
          </div>
          ${body}
        </section>`);
    }

    els.schedule.innerHTML = output.join("");
  }

  function formatUpdateTime(ts){
    return new Intl.DateTimeFormat("zh-TW",{
      timeZone:"Asia/Taipei",month:"numeric",day:"numeric",
      hour:"2-digit",minute:"2-digit",hour12:false
    }).format(new Date(ts));
  }

  async function load({force=false}={}){
    els.errorBox.style.display = "none";
    const cache = readCache();

    if(!force && isCacheFresh(cache)){
      render(cache.fixtures);
      setStatus(`使用快取 · ${cache.fixtures.length} 場 · 上次更新 ${formatUpdateTime(cache.fetchedAt)}`,"ok");
      return;
    }

    // 即使快取已過期，先顯示舊資料，避免畫面空白。
    if(cache?.fixtures) render(cache.fixtures);
    else render([]);

    els.refreshBtn.disabled = true;
    setStatus("正在更新 30 天賽程…","loading");

    try{
      const data = await fetchAll();

      if(data.fixtures.length === 0 && data.errors.length === COMPETITIONS.length){
        throw new Error(data.errors.join("\n"));
      }

      saveCache(data);
      render(data.fixtures);
      setStatus(`已更新 · 共 ${data.fixtures.length} 場 · ${formatUpdateTime(data.fetchedAt)}`,"ok");

      if(data.errors.length){
        els.errorBox.textContent = "部分賽事暫時無法取得：\n" + data.errors.join("\n");
        els.errorBox.style.display = "block";
      }
    }catch(err){
      setStatus(cache ? "更新失敗，已保留上次資料" : "更新失敗","error");
      els.errorBox.textContent =
        "目前無法取得賽程資料。\n\n" +
        (err?.message || "未知錯誤") +
        (cache ? "\n\n已繼續顯示手機中上次成功取得的資料。" : "");
      els.errorBox.style.display = "block";
    }finally{
      els.refreshBtn.disabled = false;
    }
  }

  els.refreshBtn.addEventListener("click",()=>load({force:true}));

  load();
})();
</script>
</body>
</html>
